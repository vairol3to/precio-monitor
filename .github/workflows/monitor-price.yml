name: 🚲 Monitor Precio Bicicleta

on:
  schedule:
    - cron: '0 * * * *'     # Cada hora
  workflow_dispatch:          # Permite ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: 🔍 Chequear precio
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor_price.py

      - name: 💾 Guardar historial en el repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add precio_historial.csv
          git diff --staged --quiet || git commit -m "📊 $(date +'%Y-%m-%d %H:%M') - precio actualizado"
          git pull --rebase origin main
          git push
